<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Ravi Recharge Service</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body>

<div class="dashboard">

<div class="topbar">
<h2>Ravi Recharge Service</h2>

<button class="logout-btn" onclick="logout()">
<i class="fa fa-sign-out-alt"></i> Logout
</button>
</div>

<div class="profile-card">

<img src="logo.png" class="logo">

<h2 id="userName">User Name</h2>

<p>ID : <span id="userId"></span></p>

</div>

<div class="card-box">

<div class="card">
<h3>₹ <span id="wallet">0</span></h3>
<p>Wallet Balance</p>
</div>

<div class="card">
<h3>₹ 0</h3>
<p>Earning Wallet</p>
</div>

<div class="card">
<h3>0</h3>
<p>Free Point</p>
</div>

<div class="card">
<h3>₹ 0</h3>
<p>Total Earning</p>
</div>

</div>

<div class="menu">

<a href="#"><i class="fa fa-wallet"></i><br>Add Fund</a>

<a href="#"><i class="fa fa-book"></i><br>Buy E-Book</a>

<a href="#"><i class="fa fa-exchange-alt"></i><br>Transfer</a>

<a href="#"><i class="fa fa-mobile-alt"></i><br>Recharge</a>

<a href="#"><i class="fa fa-tv"></i><br>DTH</a>

<a href="#"><i class="fa fa-bolt"></i><br>Electricity</a>

<a href="#"><i class="fa fa-tint"></i><br>Water Bill</a>

<a href="#"><i class="fa fa-fire"></i><br>Gas Bill</a>

</div>

</div>

<script>
let loginId=localStorage.getItem("currentUser");

if(loginId){

let user=JSON.parse(localStorage.getItem(loginId));

document.getElementById("userName").innerHTML=user.name;
document.getElementById("userId").innerHTML=user.loginId;
document.getElementById("wallet").innerHTML=user.wallet;

}else{

window.location.href="index.html";

}

function logout(){

localStorage.removeItem("currentUser");

window.location.href="index.html";

}
</script>

</body>
</html>
